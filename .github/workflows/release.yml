name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: |
          sudo find /etc/apt/sources.list.d/ -type f ! -name "ubuntu.sources" -delete
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl1-mesa-dev xorg-dev

      - name: Build AppImage
        run: |
          mkdir -p internal/assets/third_party/ffmpeg
          touch internal/assets/third_party/ffmpeg/placeholder.txt
          VERSION=${{ github.ref_name }} make package-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/NystaVision-x86_64.AppImage

  build-windows:
    name: Build Windows Standalone
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download Dependency (FFmpeg)
        shell: bash
        run: |
          set -e
          mkdir -p internal/assets/third_party/ffmpeg
          
          echo "Downloading FFmpeg..."
          curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip
          unzip -q ffmpeg.zip
          mv ffmpeg-*/bin/ffmpeg.exe internal/assets/third_party/ffmpeg/
          
          echo "Cleanup..."
          rm -rf ffmpeg-*/ ffmpeg.zip

      - name: Install NSIS
        run: choco install nsis -y

      - name: Compile manifest resource (UAC elevation)
        shell: bash
        run: |
          # windows-latest runners include MinGW windres at C:/mingw64/bin
          WINDRES="C:/mingw64/bin/windres.exe"
          if [ ! -f "$WINDRES" ]; then
            # fallback: try PATH
            WINDRES="windres"
          fi
          "$WINDRES" cmd/app/resource.rc -O coff -o cmd/app/resource_windows_amd64.syso
          echo "Manifest resource compiled OK"

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          $env:VERSION = "${{ github.ref_name }}"
          ./scripts/build-windows.ps1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist/*.exe

