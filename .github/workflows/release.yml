name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl1-mesa-dev xorg-dev

      - name: Build AppImage
        run: |
          mkdir -p internal/assets/third_party/ffmpeg
          mkdir -p internal/assets/third_party/driver
          touch internal/assets/third_party/ffmpeg/placeholder.txt
          touch internal/assets/third_party/driver/placeholder.txt
          make package-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/RTSPVirtualCamAgent-x86_64.AppImage

  build-windows:
    name: Build Windows Standalone
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download Dependencies (FFmpeg & Driver)
        shell: bash
        run: |
          set -e
          mkdir -p internal/assets/third_party/ffmpeg
          mkdir -p internal/assets/third_party/driver
          
          echo "Downloading FFmpeg..."
          curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip
          unzip -q ffmpeg.zip
          mv ffmpeg-*/bin/ffmpeg.exe internal/assets/third_party/ffmpeg/
          
          echo "Downloading UnityCapture Driver..."
          curl -L "https://github.com/schellingb/UnityCapture/archive/refs/heads/master.zip" -o driver.zip
          unzip -q driver.zip
          
          cp UnityCapture-master/Install/UnityCaptureFilter64.dll internal/assets/third_party/driver/virtual-camera-installer.dll
          cp UnityCapture-master/Install/Install.bat internal/assets/third_party/driver/install.bat
          touch internal/assets/third_party/driver/virtual-camera-bridge.exe
          
          echo "Cleanup..."
          rm -rf ffmpeg-*/ UnityCapture-master/ ffmpeg.zip driver.zip

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          ./scripts/build-windows.ps1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist/*.exe

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-artifacts/RTSPVirtualCamAgent-x86_64.AppImage
            all-artifacts/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
